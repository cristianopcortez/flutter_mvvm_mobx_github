name: Merge Properties
description: Merge Properties from one property to another one

inputs:
  source-file:
    description: Path to the source local.properties file
    required: true
  target-file:
    description: Path to the target local.properties file
    required: true

outputs:
  merged:
    description: Whether the properties were merged successfully (true/false)

runs:
  using: composite
  steps:
    - name: Merge properties files
      shell: bash
      run: |
        source_file="${{ inputs.source-file }}"
        target_file="${{ inputs.target-file }}"
        while IFS= read -r line || [ -n "$line" ]; do
          key=$(echo "$line" | cut -d '=' -f1)
          value=$(echo "$line" | cut -d '=' -f2-)
          grep -q "^$key=" "$target_file" && continue
          echo "$key=$value" >> "$target_file"
        done < "$source_file"
        echo "Merged properties from $source_file to $target_file"
