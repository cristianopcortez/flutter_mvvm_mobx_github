name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.35.4'

jobs:
  # ---------------------------------------------------------------------------
  # Opção A — Análise estática + testes unitários (rápido e estável).
  # Este job é o que define a cor do badge "CI".
  # ---------------------------------------------------------------------------
  unit_tests:
    name: A · Analyze + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (MobX + mocks)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze lib/ --no-fatal-infos --no-fatal-warnings

      - name: Unit tests
        run: flutter test test/

  # ---------------------------------------------------------------------------
  # Opção B — Testes instrumentados (integration_test) em emulador Android.
  # continue-on-error: o emulador no runner pode ser lento/instável; enquanto
  # isso estabiliza ele NÃO derruba o badge "CI".
  # ---------------------------------------------------------------------------
  integration_emulator:
    name: B · Integration (Android emulator)
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        api-level: [34]
    steps:
      - uses: actions/checkout@v4

      - name: Create google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (MobX + mocks)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          script: flutter test integration_test
