name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

env:
  FLUTTER_VERSION: '3.35.4'

jobs:
  # ---------------------------------------------------------------------------
  # Option A — Static analysis + unit tests (fast and stable).
  # This job drives the CI badge color.
  # ---------------------------------------------------------------------------
  unit_tests:
    name: A · Analyze + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (MobX + mocks)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze lib/ --no-fatal-infos --no-fatal-warnings

      - name: Unit tests
        run: flutter test test/

  # ---------------------------------------------------------------------------
  # Option B — Instrumented tests (integration_test) on Android emulator.
  # continue-on-error: emulator on the runner can be slow/flaky; while it
  # stabilizes it does NOT affect the CI badge.
  # ---------------------------------------------------------------------------
  integration_emulator:
    name: B · Integration (Android emulator)
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      matrix:
        api-level: [34]
    steps:
      - uses: actions/checkout@v4

      - name: Create google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (MobX + mocks)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          arch: x86_64
          profile: pixel_5
          disable-animations: true
          script: flutter test integration_test

  # ---------------------------------------------------------------------------
  # Option B2 — Instrumented tests (integration_test) on iOS simulator.
  # Requires macos-latest (includes Xcode). continue-on-error: does not
  # affect the CI badge while stabilizing.
  # ---------------------------------------------------------------------------
  integration_ios_simulator:
    name: B2 · Integration (iOS simulator)
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Create GoogleService-Info.plist
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_PLIST_BASE64 }}" | base64 -d > ios/Runner/GoogleService-Info.plist

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (MobX + mocks)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Install CocoaPods dependencies
        run: pod install
        working-directory: ios

      - name: Boot iOS Simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep -E 'iPhone [0-9]' | head -1 | grep -Eo '[A-F0-9-]{36}')
          echo "Booting simulator UDID: $UDID"
          xcrun simctl boot "$UDID" || echo "Already booted"
          xcrun simctl bootstatus "$UDID" -b
          echo "SIM_UDID=$UDID" >> $GITHUB_ENV

      - name: Pre-build iOS app for simulator
        # Build once so the Xcode DerivedData cache is warm before running
        # each test file. Without this, the first cold build exceeds the
        # default 12-minute flutter test timeout.
        run: |
          flutter build ios --simulator --debug \
            --dart-define=FIREBASE_API_KEY="${{ secrets.FIREBASE_API_KEY }}" \
            --dart-define=FIREBASE_APP_ID="${{ secrets.FIREBASE_APP_ID }}"

      - name: Run integration tests on iOS simulator
        # home_screen_test excluded: NativeVideoView (platform view) hangs on
        # headless simulator even with empty fileName. The other 3 suites cover
        # the core business logic and run cleanly on iOS.
        # Files run one at a time to avoid concurrent Xcode DerivedData locks.
        run: |
          DEFINES="--dart-define=FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }} --dart-define=FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}"
          for f in \
            integration_test/cart_flow_test.dart \
            integration_test/product_list_test.dart \
            integration_test/post_list_test.dart; do
            echo "--- Running $f ---"
            flutter test "$f" $DEFINES -d "${{ env.SIM_UDID }}" --timeout 30m
          done
